workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - when: never

stages:
  - build
  - publish
  - deploy

variables:
  REGISTRY_IMAGE_WORKERS: '$CI_REGISTRY_IMAGE/workers'
  REGISTRY_IMAGE_MINIBOT: '$CI_REGISTRY_IMAGE/minibot'
  DOCKER_DRIVER: overlay2

build-image:
  stage: build
  tags:
    - manager
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build --pull -t "$REGISTRY_IMAGE_WORKERS:$CI_COMMIT_TAG" .
    - docker build --pull -t "$REGISTRY_IMAGE_MINIBOT:$CI_COMMIT_TAG" -f Dockerfile.minibot .

publish-image:
  stage: publish
  needs: [build-image]
  tags:
    - manager
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker push "$REGISTRY_IMAGE_WORKERS:$CI_COMMIT_TAG"
    - docker push "$REGISTRY_IMAGE_MINIBOT:$CI_COMMIT_TAG"

deploy-dev:
  stage: deploy
  needs: [publish-image]
  tags:
    - manager
  rules:
    - if: '$CI_COMMIT_TAG =~ /^dev-/'
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker pull "$REGISTRY_IMAGE_WORKERS:$CI_COMMIT_TAG"
    - docker pull "$REGISTRY_IMAGE_MINIBOT:$CI_COMMIT_TAG"
    - export IMAGE=$REGISTRY_IMAGE_WORKERS:$CI_COMMIT_TAG
    - export IMAGE_MINIBOT=$REGISTRY_IMAGE_MINIBOT:$CI_COMMIT_TAG
    - docker stack deploy -c docker-stack.dev.yml --with-registry-auth queue-workers-dev

deploy-prod:
  stage: deploy
  needs: [publish-image]
  tags:
    - manager
  rules:
    - if: '$CI_COMMIT_TAG =~ /^prod-/'
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker pull "$REGISTRY_IMAGE_WORKERS:$CI_COMMIT_TAG"
    - docker pull "$REGISTRY_IMAGE_MINIBOT:$CI_COMMIT_TAG"
    - export IMAGE=$REGISTRY_IMAGE_WORKERS:$CI_COMMIT_TAG
    - export IMAGE_MINIBOT=$REGISTRY_IMAGE_MINIBOT:$CI_COMMIT_TAG
    - docker stack deploy -c docker-stack.prod.yml --with-registry-auth queue-workers-prod
