services:
  queue-workers:
    image: ${IMAGE}
    dns:
      - 127.0.0.11
      - 1.1.1.1
      - 8.8.8.8
    environment:
      NODE_ENV: production
      NGROK_TCP_HOST: ${NGROK_TCP_HOST}
      NGROK_TCP_PORT: ${NGROK_TCP_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CALL_DB_URL: ${CALL_DB_URL}
      SMS_DB_URL: ${SMS_DB_URL}
      CLIENTS_DB_URL: ${CLIENTS_DB_URL}
      USERS_DB_URL: ${USERS_DB_URL:-}
      TELEGRAM_GATEWAY_ENABLED: ${TELEGRAM_GATEWAY_ENABLED:-false}
      TELEGRAM_GATEWAY_URL: ${TELEGRAM_GATEWAY_URL:-}
      TELEGRAM_GATEWAY_CALLER_ID: ${TELEGRAM_GATEWAY_CALLER_ID:-}
      TELEGRAM_GATEWAY_API_KEY: ${TELEGRAM_GATEWAY_API_KEY:-}
      TELEGRAM_GATEWAY_CHAT_ID: ${TELEGRAM_GATEWAY_CHAT_ID:-}
      TELEGRAM_GATEWAY_CHAT_ALIAS: ${TELEGRAM_GATEWAY_CHAT_ALIAS:-}
      TELEGRAM_GATEWAY_EXPECTED_APP_KEY: ${TELEGRAM_GATEWAY_EXPECTED_APP_KEY:-}
      TELEGRAM_GATEWAY_EXPECTED_ROUTE_KEY: ${TELEGRAM_GATEWAY_EXPECTED_ROUTE_KEY:-}
      AUTO_CLAIM_SHADOW: ${AUTO_CLAIM_SHADOW:-true}
      AUTO_CLAIM_ENABLED: ${AUTO_CLAIM_ENABLED:-false}
      AUTO_CLAIM_SEND_DM: ${AUTO_CLAIM_SEND_DM:-false}
      AUTO_CLAIM_ADMIN: ${AUTO_CLAIM_ADMIN:-}
      AUTO_CLAIM_LOOKBACK_HOURS: ${AUTO_CLAIM_LOOKBACK_HOURS:-168}
      AUTO_CLAIM_MIN_CALL_DURATION_SEC: ${AUTO_CLAIM_MIN_CALL_DURATION_SEC:-15}
      AUTO_CLAIM_CONNECTED_RESULTS: ${AUTO_CLAIM_CONNECTED_RESULTS:-accepted,answered,connected,completed}
      WEBHOOK_SMS_URL: ${WEBHOOK_SMS_URL:-}
      WEBHOOK_CALL_URL: ${WEBHOOK_CALL_URL:-}
    ports:
      - '${QUEUE_WORKERS_DEV_PUBLISHED_PORT:-8000}:8000'
    deploy:
      replicas: 1
      placement:
        constraints:
          - ${QUEUE_WORKERS_DEV_PLACEMENT_CONSTRAINT:-node.role == manager}
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '${QUEUE_WORKERS_DEV_CPU_LIMIT:-0.50}'
          memory: '${QUEUE_WORKERS_DEV_MEMORY_LIMIT:-512M}'
        reservations:
          cpus: '${QUEUE_WORKERS_DEV_CPU_RESERVATION:-0.25}'
          memory: '${QUEUE_WORKERS_DEV_MEMORY_RESERVATION:-256M}'
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: stop-first
    networks:
      - backend

  mini-bot:
    image: ${IMAGE_MINIBOT}
    environment:
      PYTHONUNBUFFERED: 1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
      NGROK_TCP_HOST: ${NGROK_TCP_HOST}
      NGROK_TCP_PORT: ${NGROK_TCP_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      MONGO_URI: ${MONGO_URI:-${CLIENTS_DB_URL}}
      AUTO_CLAIM_ADMIN: ${AUTO_CLAIM_ADMIN:-}
    deploy:
      replicas: 1
      placement:
        constraints:
          - ${MINI_BOT_DEV_PLACEMENT_CONSTRAINT:-node.role == manager}
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
    networks:
      - backend

networks:
  backend:
    name: ${QUEUE_WORKERS_DEV_BACKEND_NETWORK:-queue-workers-dev-backend}
    driver: overlay
    attachable: true
